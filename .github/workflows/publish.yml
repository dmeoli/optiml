name: publish

# build and publish the package to PyPI whenever a GitHub Release is published
# (i.e., when a new vX.Y tag is released). Authentication uses PyPI Trusted
# Publishing (OIDC) so no API token needs to be stored as a secret.

on:
  release:
    types: [ published ]

jobs:
  pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build the sdist and the wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check the distributions
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
